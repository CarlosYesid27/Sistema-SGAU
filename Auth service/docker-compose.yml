services:
  db:
    image: postgres:17-alpine
    container_name: sgau_auth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Yesid270318b
      POSTGRES_DB: sgau_auth
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sgau_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sgau-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgau_auth_backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:Yesid270318b@db:5432/sgau_auth
      SECRET_KEY: sgau-super-secret-jwt-key-min-32-chars-for-production-use
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      FRONTEND_ORIGIN: http://localhost:5173
      USER_SERVICE_URL: http://sgau_backend:8000
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sgau-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  auth_db_data:

networks:
  sgau-network:
    driver: bridge
