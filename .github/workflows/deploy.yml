name: CI - Automated Tests and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Auth Service Tests
  # ─────────────────────────────────────────────
  test-auth-service:
    name: Auth Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: "Auth service/backend"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Auth Service tests
        working-directory: "Auth service/backend"
        env:
          SECRET_KEY: "test-secret-key-for-ci-only"
          DATABASE_URL: "sqlite:///./test.db"
          FRONTEND_ORIGIN: "http://localhost:5173"
          USER_SERVICE_URL: "http://localhost:8000"
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # JOB 2: Course Service Tests
  # ─────────────────────────────────────────────
  test-course-service:
    name: Course Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: "Course service/backend"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Course Service tests
        working-directory: "Course service/backend"
        env:
          SECRET_KEY: "test-secret-key-for-ci-only"
          DATABASE_URL: "sqlite:///./test.db"
          FRONTEND_ORIGIN: "http://localhost:5173"
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # JOB 3: Enrollment Service Tests
  # ─────────────────────────────────────────────
  test-enrollment-service:
    name: Enrollment Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: "Enrollment Service/backend"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Enrollment Service tests
        working-directory: "Enrollment Service/backend"
        env:
          SECRET_KEY: "test-secret-key-for-ci-only"
          DATABASE_URL: "sqlite:///./test.db"
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # JOB 4: Deploy (only if all tests pass)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-course-service, test-enrollment-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Sistema-SGAU
            git pull origin main
            cd Gateway
            docker compose down
            docker compose up -d --build
